  <text x="108" y="786" fill="#0F6FFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">03</text>
  <text x="108" y="826" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Site network</text>
  <text x="108" y="864" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">Distribution across wards, offices,</text>
  <text x="108" y="894" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">branches, campuses, and shared areas.</text>
  <path d="M674 840H770" stroke="#0F6FFF" stroke-width="8" stroke-linecap="round"/>
