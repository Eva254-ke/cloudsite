  <text x="94" y="104" fill="white" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">What we build</text>
  <text x="72" y="174" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700">From backhaul to</text>
  <text x="72" y="228" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700">live operations.</text>
  <text x="72" y="270" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="24">The link, the local network, and the</text>
  <text x="72" y="302" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="24">operating layer are built as one system.</text>
  <path d="M450 348V1120" stroke="#0F6FFF" stroke-width="4"/>
  <circle cx="450" cy="390" r="10" fill="#0F6FFF"/>
  <circle cx="450" cy="584" r="10" fill="#0F6FFF"/>
  <circle cx="450" cy="778" r="10" fill="#0F6FFF"/>
