  <text x="104" y="1216" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">CloudBridge stays accountable from</text>
  <text x="104" y="1250" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">first link design to daily service continuity.</text>
