  <text x="108" y="398" fill="#0F6FFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">01</text>
  <text x="108" y="438" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Satellite backhaul</text>
  <text x="108" y="476" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">Primary connectivity for sites where</text>
  <text x="108" y="506" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">stable terrestrial service cannot be trusted.</text>
  <circle cx="732" cy="434" r="34" stroke="#0F6FFF" stroke-width="8"/>
  <path d="M706 460L758 408" stroke="#0F6FFF" stroke-width="8" stroke-linecap="round"/>
  <rect x="72" y="548" width="756" height="156" rx="8" fill="#FAFAFA" stroke="#0A0A0A" stroke-width="3"/>
  <text x="108" y="592" fill="#0F6FFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">02</text>
  <text x="108" y="632" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Edge and routing</text>
  <text x="108" y="670" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">On-site equipment set up around traffic,</text>
  <text x="108" y="700" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">power limits, and site conditions.</text>
  <rect x="678" y="604" width="88" height="56" rx="4" stroke="#0F6FFF" stroke-width="8"/>
