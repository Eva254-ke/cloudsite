  <circle cx="722" cy="874" r="10" fill="#0F6FFF"/>
  <rect x="72" y="936" width="756" height="156" rx="8" fill="#FAFAFA" stroke="#0A0A0A" stroke-width="3"/>
  <text x="108" y="980" fill="#0F6FFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">04</text>
  <text x="108" y="1020" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Billing and operations</text>
  <text x="108" y="1058" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">Usage rules, monitoring, support, and</text>
  <text x="108" y="1088" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">service workflows built into the rollout.</text>
