  <text x="518" y="721" fill="white" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">On-site control</text>
  <rect x="816" y="478" width="296" height="272" rx="8" fill="#FAFAFA" stroke="#0A0A0A" stroke-width="3"/>
  <text x="848" y="528" fill="#0F6FFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">03</text>
  <text x="848" y="570" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Site network</text>
  <text x="848" y="612" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">Distribution across wards, offices,</text>
  <text x="848" y="642" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">branches, campuses, and shared</text>
  <text x="848" y="672" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">working areas.</text>
  <path d="M902 612H1030" stroke="#0F6FFF" stroke-width="8" stroke-linecap="round"/>
  <path d="M966 580V652" stroke="#0F6FFF" stroke-width="8" stroke-linecap="round"/>
