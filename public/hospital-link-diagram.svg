<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="white"/>
  <rect x="60" y="60" width="1480" height="860" rx="8" fill="white" stroke="#0A0A0A" stroke-width="4"/>
  <rect x="116" y="112" width="176" height="52" rx="4" fill="#0A0A0A"/>
  <text x="140" y="146" fill="white" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">What we build</text>
  <text x="116" y="238" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="700">From satellite backhaul</text>
  <text x="116" y="304" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="700">to live site operations.</text>
  <text x="116" y="350" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="26">Each deployment is designed as one connected delivery path, not separate vendors</text>
  <text x="116" y="386" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="26">for the link, the local network, and the systems that keep service running.</text>
  <path d="M140 438H1460" stroke="#0F6FFF" stroke-width="4"/>
  <circle cx="260" cy="438" r="10" fill="#0F6FFF"/>
  <circle cx="612" cy="438" r="10" fill="#0F6FFF"/>
  <circle cx="964" cy="438" r="10" fill="#0F6FFF"/>
  <circle cx="1316" cy="438" r="10" fill="#0F6FFF"/>
  <rect x="112" y="478" width="296" height="272" rx="8" fill="#FAFAFA" stroke="#0A0A0A" stroke-width="3"/>
  <text x="144" y="528" fill="#0F6FFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">01</text>
  <text x="144" y="570" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Satellite backhaul</text>
  <text x="144" y="612" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">Primary connectivity for sites</text>
  <text x="144" y="642" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">where stable terrestrial service</text>
  <text x="144" y="672" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">cannot be trusted.</text>
  <circle cx="300" cy="620" r="44" stroke="#0F6FFF" stroke-width="8"/>
  <path d="M268 652L332 588" stroke="#0F6FFF" stroke-width="8" stroke-linecap="round"/>
  <rect x="144" y="700" width="132" height="32" rx="4" fill="#0A0A0A"/>
  <text x="166" y="721" fill="white" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Remote reach</text>
  <rect x="464" y="478" width="296" height="272" rx="8" fill="#FAFAFA" stroke="#0A0A0A" stroke-width="3"/>
  <text x="496" y="528" fill="#0F6FFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">02</text>
  <text x="496" y="570" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Edge and routing</text>
  <text x="496" y="612" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">On-site equipment placed and</text>
  <text x="496" y="642" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">configured around traffic, power,</text>
  <text x="496" y="672" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">and site conditions.</text>
  <rect x="592" y="586" width="108" height="72" rx="4" stroke="#0F6FFF" stroke-width="8"/>
  <path d="M646 586V658" stroke="#0F6FFF" stroke-width="8"/>
