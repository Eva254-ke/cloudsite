  <rect x="1168" y="478" width="296" height="272" rx="8" fill="#FAFAFA" stroke="#0A0A0A" stroke-width="3"/>
  <text x="1200" y="528" fill="#0F6FFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">04</text>
  <text x="1200" y="570" fill="#0A0A0A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Billing and operations</text>
  <text x="1200" y="612" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">Usage rules, monitoring, support,</text>
  <text x="1200" y="642" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">and service workflows handled</text>
  <text x="1200" y="672" fill="#525252" font-family="Inter, Arial, sans-serif" font-size="22">as part of the build.</text>
