  <text x="1222" y="721" fill="white" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Live service</text>
  <rect x="112" y="790" width="1352" height="82" rx="8" fill="#0A0A0A"/>
  <text x="144" y="840" fill="white" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">CloudBridge stays responsible from first link design to day-to-day service continuity.</text>
